spring.datasource.url=jdbc:h2:mem:escrims;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-12345678901234567890}
app.rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:200}
app.rate-limit.window-millis=${RATE_LIMIT_WINDOW_MILLIS:60000}
