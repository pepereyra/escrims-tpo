spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:escrims}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:escrims_user}
spring.datasource.password=${MYSQL_PASSWORD:escrims_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.h2.console.enabled=false
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-12345678901234567890}
app.rate-limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:200}
app.rate-limit.window-millis=${RATE_LIMIT_WINDOW_MILLIS:60000}
app.reminders.scheduler.enabled=${REMINDERS_SCHEDULER_ENABLED:true}
app.reminders.horas-antes=${REMINDERS_HORAS_ANTES:24}
app.reminders.scheduler.initial-delay-millis=${REMINDERS_INITIAL_DELAY_MILLIS:60000}
app.reminders.scheduler.fixed-delay-millis=${REMINDERS_FIXED_DELAY_MILLIS:60000}
app.demo-data.enabled=${DEMO_DATA_ENABLED:false}
app.notifications.queue=${NOTIFICATIONS_QUEUE:memory}
